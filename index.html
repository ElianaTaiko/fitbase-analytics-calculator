<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Калькулятор тарифов Fitbase Analytics</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <img class="logo-badge" src="assets/fitbase-logo.webp" alt="Fitbase" />
      <div>
        <h1>Калькулятор тарифов Fitbase Analytics</h1>
        <p>Внутренний инструмент отдела продаж</p>
      </div>
    </div>
  </header>

  <main class="app-main">
    <div id="tariff-switcher-slot"></div>

    <div class="two-col-grid">
      <div class="card" id="left-column">
        <div id="left-column-body"></div>
      </div>

      <div id="right-column">
        <div class="card" id="results-card">
          <h2>Результаты расчёта</h2>
          <div id="results-card-body"></div>
        </div>
        <div id="offer-card-slot"></div>
      </div>
    </div>
  </main>

  <script src="js/pricing-config.js"></script>
  <script src="js/calculators.js"></script>
  <script src="js/state.js"></script>
  <script src="js/offer-text.js"></script>
  <script src="js/render.js"></script>
  <script src="js/pdf-export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
